name: CI

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            release:
                type: boolean
                required: true
                default: true

permissions:
    contents: read

env:
    ZIPLAC_URL: https://github.com/ci7lus/ziplac/releases/download/v0.1.0/ziplac-linux-amd64

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Type check
              run: pnpm type

            - name: Install ziplac
              if: ${{ inputs.release }}
              run: |
                  install -m 700 -d "$RUNNER_TEMP/bin"
                  curl -fsSL "$ZIPLAC_URL" -o "$RUNNER_TEMP/bin/ziplac"
                  chmod +x "$RUNNER_TEMP/bin/ziplac"
                  echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

            - name: Prepare signing files
              if: ${{ inputs.release }}
              env:
                  SIGN_CRT: ${{ secrets.SIGN_CRT }}
                  SIGN_KEY: ${{ secrets.SIGN_KEY }}
              run: |
                  if [ -z "$SIGN_CRT" ] || [ -z "$SIGN_KEY" ]; then
                    echo "SIGN_CRT and SIGN_KEY secrets must both be set to sign plugin packages." >&2
                    exit 1
                  fi

                  signing_dir="$RUNNER_TEMP/kiririn-plugin-signing"
                  install -m 700 -d "$signing_dir"
                  printf '%s' "$SIGN_CRT" > "$signing_dir/signer.crt"
                  printf '%s' "$SIGN_KEY" > "$signing_dir/signer.key"
                  chmod 600 "$signing_dir/signer.crt" "$signing_dir/signer.key"

                  echo "SIGN_CRT_PATH=$signing_dir/signer.crt" >> "$GITHUB_ENV"
                  echo "SIGN_KEY_PATH=$signing_dir/signer.key" >> "$GITHUB_ENV"

            - name: Build
              if: ${{ !inputs.release }}
              run: pnpm build

            - name: Build (with uploading source maps to Sentry)
              if: ${{ inputs.release }}
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
              run: pnpm build

            - name: Upload dist artifact
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist
                  if-no-files-found: error

    release:
        name: Release
        needs: build
        if: ${{ inputs.release }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            attestations: write
            id-token: write
        steps:
            - name: Download dist artifact
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: release-assets

            - name: Prepare release metadata
              id: release_meta
              run: |
                  release_tag="$(date -u +'%Y%m%d%H%M')"
                  echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"

            # - name: Generate artifact attestation
            #   uses: actions/attest@v4
            #   with:
            #       subject-path: release-assets/*

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
              run: |
                  gh release create --repo "$GH_REPO" "${{ steps.release_meta.outputs.tag }}" \
                    --title "${{ steps.release_meta.outputs.tag }}" \
                    --generate-notes \
                    release-assets/*.kppx
